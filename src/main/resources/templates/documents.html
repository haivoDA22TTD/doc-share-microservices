<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="docs.title">My Documents - DocShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/i18n.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-6">
                    <h1 class="text-2xl font-bold text-blue-600" data-i18n="dashboard.title">DocShare</h1>
                    <a href="/dashboard" class="text-gray-600 hover:text-blue-600" data-i18n="nav.dashboard">Dashboard</a>
                    <a href="/documents" class="text-blue-600 font-semibold" data-i18n="nav.documents">Documents</a>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="lang-toggle" onclick="toggleLanguage()" class="text-gray-700 hover:text-blue-600 font-semibold px-3 py-2 rounded border border-gray-300 hover:border-blue-500">
                        🇬🇧 EN
                    </button>
                    <span id="user-info" class="text-gray-700"></span>
                    <button id="logout-btn" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded" data-i18n="nav.logout">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold" data-i18n="docs.title">My Documents</h2>
            <a href="/documents/new" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" data-i18n="docs.newDoc">
                + New Document
            </a>
        </div>

        <div class="mb-6">
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex space-x-8">
                    <button id="tab-my-docs" class="tab-btn border-b-2 border-blue-500 py-4 px-1 text-blue-600 font-medium" data-i18n="docs.myDocs">
                        My Documents
                    </button>
                    <button id="tab-shared" class="tab-btn border-b-2 border-transparent py-4 px-1 text-gray-500 hover:text-gray-700" data-i18n="docs.sharedWithMe">
                        Shared With Me
                    </button>
                </nav>
            </div>
        </div>

        <div id="my-documents" class="space-y-4"></div>
        <div id="shared-documents" class="space-y-4 hidden"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = '/login';
        }

        document.getElementById('user-info').textContent = `${t('nav.hello')}, ${user.username}`;
        document.getElementById('logout-btn').addEventListener('click', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    // Call logout API to blacklist token
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                } catch (error) {
                    console.error('Logout API error:', error);
                }
            }
            localStorage.clear();
            window.location.href = '/login';
        });

        async function loadMyDocuments() {
            try {
                const response = await fetch('/api/documents/my-documents', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const documents = await response.json();
                    displayDocuments(documents, 'my-documents');
                } else if (response.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Error loading documents:', error);
            }
        }

        async function loadSharedDocuments() {
            try {
                const response = await fetch('/api/documents/shared-with-me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const documents = await response.json();
                    displayDocuments(documents, 'shared-documents');
                }
            } catch (error) {
                console.error('Error loading shared documents:', error);
            }
        }

        function displayDocuments(documents, containerId) {
            const container = document.getElementById(containerId);
            
            if (documents.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No documents found</p>';
                return;
            }

            container.innerHTML = documents.map(doc => `
                <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="text-xl font-semibold mb-2">
                                <a href="/documents/${doc.id}" class="text-blue-600 hover:text-blue-800">${doc.title}</a>
                            </h3>
                            <p class="text-gray-600 text-sm mb-2">
                                Owner: ${doc.ownerUsername} | Permission: ${doc.userPermission}
                            </p>
                            <p class="text-gray-500 text-sm">
                                Last edited: ${new Date(doc.lastEditedAt).toLocaleString()}
                            </p>
                        </div>
                        ${doc.userPermission === 'OWNER' ? `
                        <div class="flex space-x-2">
                            <a href="/documents/${doc.id}/share" class="text-green-600 hover:text-green-800 px-3 py-1 border border-green-600 rounded">
                                Share
                            </a>
                            <button onclick="deleteDocument(${doc.id})" class="text-red-600 hover:text-red-800 px-3 py-1 border border-red-600 rounded">
                                Delete
                            </button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function deleteDocument(id) {
            if (!confirm('Are you sure you want to delete this document?')) return;

            try {
                const response = await fetch(`/api/documents/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    loadMyDocuments();
                } else {
                    alert('Failed to delete document');
                }
            } catch (error) {
                console.error('Error deleting document:', error);
            }
        }

        document.getElementById('tab-my-docs').addEventListener('click', () => {
            document.getElementById('my-documents').classList.remove('hidden');
            document.getElementById('shared-documents').classList.add('hidden');
            document.getElementById('tab-my-docs').classList.add('border-blue-500', 'text-blue-600');
            document.getElementById('tab-my-docs').classList.remove('border-transparent', 'text-gray-500');
            document.getElementById('tab-shared').classList.remove('border-blue-500', 'text-blue-600');
            document.getElementById('tab-shared').classList.add('border-transparent', 'text-gray-500');
        });

        document.getElementById('tab-shared').addEventListener('click', () => {
            document.getElementById('my-documents').classList.add('hidden');
            document.getElementById('shared-documents').classList.remove('hidden');
            document.getElementById('tab-shared').classList.add('border-blue-500', 'text-blue-600');
            document.getElementById('tab-shared').classList.remove('border-transparent', 'text-gray-500');
            document.getElementById('tab-my-docs').classList.remove('border-blue-500', 'text-blue-600');
            document.getElementById('tab-my-docs').classList.add('border-transparent', 'text-gray-500');
            loadSharedDocuments();
        });

        loadMyDocuments();
    </script>
</body>
</html>
